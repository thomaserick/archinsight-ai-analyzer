spring:
  application:
    name: archinsight-ai-analyzer

  jackson:
    time-zone: UTC

  data:
    web:
      sort:
        sort-parameter: order
      pageable:
        page-parameter: page
        one-indexed-parameters: true
        size-parameter: pageSize
        max-page-size: 50
        default-page-size: 10

  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.SystemMetricsAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.metrics.export.simple.SimpleMetricsExportAutoConfiguration

  rabbitmq:
    addresses: amqps://elahmmls:evf5hany0fERC15irOqm85beH_WTcxBs@gerbil.rmq.cloudamqp.com/elahmmls
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
        default-requeue-rejected: false

springdoc:
  default-produces-media-type: application/json
  api-docs:
    path: /swagger-ui/v3/api-docs
  swagger-ui:
    title: ArchInsight AI Analyzer
    doc-expansion: none
    display-request-duration: true
    groups-order: DESC
    operationsSorter: alpha
    tagsSorter: alpha
    disable-swagger-default-url: true
    path: /swagger-ui
  group-configs:
    - group: v1 - api
      paths-to-match: /v1/**

management:
  endpoints:
    web:
      exposure:
        include: health
  metrics:
    enable:
      process: false
      system: false
  endpoint:
    metrics:
      enabled: false
    health:
      probes:
        enabled: true

broker:
  queue:
    analise:
      solicitada: default.analise.solicitada
      concluida: default.analise.concluida
      falhou: default.analise.falhou

aws:
  s3:
    region: ${AWS_S3_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    bucket: archinsight-ai-storage
    endpoint: ${AWS_S3_ENDPOINT:}    #localstack


server:
  port: 8083