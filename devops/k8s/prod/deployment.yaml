apiVersion: apps/v1
kind: Deployment
metadata:
  name: archinsight-ai-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archinsight-ai-analyzer
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: archinsight-ai-analyzer
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: archinsight-ai-analyzer
          image: "docker.io/thomaserick/archinsight-ai-analyzer:latest"
          resources:
            requests:
              memory: "400Mi"
              cpu: "200m"
            limits:
              memory: "700Mi"
              cpu: "500m"
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: access-key

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: secret-key
